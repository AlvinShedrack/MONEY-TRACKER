<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4CAF50">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Money Tracker">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">
    <title>Money Tracker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Money Tracker</h1>

        <!-- UP Section -->
        <div class="provider-section" id="UP-section">
            <h2 onclick="toggleProvider('UP')">UP</h2>
            
            <label for="UP-monday-date">Enter Monday's Date:</label>
            <input type="date" id="UP-monday-date" />
            
            <button id="add-UP-week">Add New Week</button>

            <div id="UP-weeks" class="weeks-container"></div>
        </div>

        <hr>

        <!-- DOWN Section -->
        <div class="provider-section" id="DOWN-section">
            <h2 onclick="toggleProvider('DOWN')">DOWN</h2>
            
            <label for="DOWN-monday-date">Enter Monday's Date:</label>
            <input type="date" id="DOWN-monday-date" />
            
            <button id="add-DOWN-week">Add New Week</button>

            <div id="DOWN-weeks" class="weeks-container"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
